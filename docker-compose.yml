version: "3.9"

services:
  web:
    build: .
    container_name: travel_app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./data/travel_app.db
      LOG_DIR: /app/logs
    volumes:
      - .:/app
      - travel_app_data:/app/data

volumes:
  travel_app_data: